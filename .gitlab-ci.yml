stages:
  - build
  - deploy

variables:
  STAGING_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  STAGING_LATEST_IMAGE: $CI_REGISTRY_IMAGE:staging
  PROD_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  PROD_LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest
build_staging:
  image: docker:latest
  stage: build
  tags:
    - staging
  services:
    - docker:19.03.12-dind
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker build -t $STAGING_IMAGE .
    - docker tag $STAGING_IMAGE $STAGING_LATEST_IMAGE
    - docker push $STAGING_IMAGE
    - docker push $STAGING_LATEST_IMAGE
  rules:
    - if: $CI_COMMIT_REF_NAME != 'master'
      when: never
    - changes:
        - docker-compose.yml
        - .gitlab-ci.yml
      when: never

deploy_staging:
  variables: 
    DB_HOST: "eventsdb"
    DB_PORT: 5432
    DB_USER: ${DEV_REG_PG_USER}
    DB_DATABASE: "event"
    DB_PASSWORD: "password"
    DATABASE_URL: "postgres://${DEV_REG_PG_USER}:password@eventsdb:5432/${DEV_PROFILE_PG_DBNAME}"
    APP_PORT: "8080"
    APP_MODE: "dev"
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.2.0
  stage: deploy
  tags:
    - staging
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - "[ ! -d /opt/srv-events-db ] && mkdir /opt/srv-events-db"
    - cp -f db/initial.sql /opt/srv-events-db/initial.sql
    - IMAGE_NAME=$STAGING_LATEST_IMAGE docker-compose up -d --remove-orphans
  only:
    - master


