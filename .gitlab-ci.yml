stages:
  - test
  - build
  - deploy

variables:
  STAGING_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  STAGING_LATEST_IMAGE: $CI_REGISTRY_IMAGE:staging
  PROD_IMAGE: $CI_REGISTRY_IMAGE:$CI_COMMIT_TAG
  PROD_LATEST_IMAGE: $CI_REGISTRY_IMAGE:latest

test:
  image: golang:1.21
  stage: test
  services:
    - name: postgres:12
      alias: postgres
  variables:
    # PostgreSQL service configuration
    POSTGRES_DB: events_test
    POSTGRES_USER: postgres
    POSTGRES_PASSWORD: postgres
    POSTGRES_HOST_AUTH_METHOD: trust
    # Application test configuration
    DB_HOST: postgres
    DB_PORT: "5432"
    DB_USER: postgres
    DB_PASSWORD: postgres
    DB_DATABASE: events_test
    DB_SSLMODE: disable
    APP_ENV: test
    APP_MODE: debug
  before_script:
    # Wait for PostgreSQL to be ready
    - apt-get update && apt-get install -y postgresql-client
    - until PGPASSWORD=$POSTGRES_PASSWORD psql -h postgres -U $POSTGRES_USER -d $POSTGRES_DB -c '\q'; do
        echo "PostgreSQL is unavailable - sleeping";
        sleep 2;
      done
    - echo "PostgreSQL is up"
  script:
    - go mod download
    - go test -v -race -coverprofile=coverage.out ./...
    - go tool cover -func=coverage.out
  coverage: '/total:\s+\(statements\)\s+(\d+\.\d+)%/'
  artifacts:
    paths:
      - coverage.out
    expire_in: 1 week
  only:
    - master
    - tags
    - merge_requests

build_staging:
  image: docker:latest
  stage: build
  services:
    - docker:26.0.0-dind
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker build --build-arg GIT_SHA=$CI_COMMIT_SHA -t $STAGING_IMAGE .
    - docker tag $STAGING_IMAGE $STAGING_LATEST_IMAGE
    - docker push $STAGING_IMAGE
    - docker push $STAGING_LATEST_IMAGE
  only:
    - master
  
deploy_staging:
  variables: 
    APP_PORT: "8080"
    APP_MODE: "release"
    APP_ENV: "staging"
    DB_HOST: "eventsdb"
    DB_PORT: 5432
    DB_USER: "eventsuser"
    DB_DATABASE: "event_database"
    DB_PASSWORD: "mypassword"
    SENTRY_DSN: ${STAGING_EVENTS_SENTRY_DSN}
    KEYCLOAK_SERVER_URL: ${DYN_STAGING_KEYCLOAK_SERVER_BASE_URL}
    KEYCLOAK_REALM: ${DYN_STAGING_KEYCLOAK_REALM}
    KEYCLOAK_CLIENT_ID: ${DYN_STAGING_KEYCLOAK_CONFIDENTIAL_CLIENT_ID}
    KEYCLOAK_CLIENT_SECRET: ${DYN_STAGING_KEYCLOAK_CONFIDENTIAL_CLIENT_SECRET}
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.8.0
  stage: deploy
  tags:
    - staging
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - "[ ! -d /opt/srv-events-db ] && mkdir /opt/srv-events-db"
    - IMAGE_NAME=$STAGING_IMAGE docker compose up -d --remove-orphans eventsdb
    - sleep 10
    - IMAGE_NAME=$STAGING_IMAGE docker compose up -d --remove-orphans
  only:
    - master

build_production:
  image: docker:latest
  stage: build
  services:
    - docker:26.0.0-dind
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - docker build --build-arg GIT_SHA=$CI_COMMIT_SHA -t $PROD_IMAGE .
    - docker push $PROD_IMAGE
  only:
    - tags

deploy_production:
  image: gitlab.bbdev.team:5050/vh/buildutils/buildutil:0.8.0
  stage: deploy
  tags:
    - production
  variables: 
    APP_PORT: "8080"
    APP_MODE: "release"
    APP_ENV: "production"
    DB_HOST: "${PROD_PG_HOST}" 
    DB_PORT: ${PROD_PG_PORT} 
    DB_USER: ${PROD_EVENTS_DB_USER}
    DB_DATABASE: ${PROD_EVENTS_DB_NAME}
    DB_PASSWORD: "${PROD_EVENTS_DB_PASS}"
    SENTRY_DSN: ${PROD_EVENTS_SENTRY_DSN}
    KEYCLOAK_SERVER_URL: ${DYN_PROD_KEYCLOAK_SERVER_BASE_URL}
    KEYCLOAK_REALM: ${DYN_PROD_KEYCLOAK_REALM}
    KEYCLOAK_CLIENT_ID: ${DYN_PROD_KEYCLOAK_CONFIDENTIAL_CLIENT_ID}
    KEYCLOAK_CLIENT_SECRET: ${DYN_PROD_KEYCLOAK_CONFIDENTIAL_CLIENT_SECRET}
  script:
    - docker login -u gitlab-ci-token -p $CI_BUILD_TOKEN $CI_REGISTRY
    - IMAGE_NAME=$PROD_IMAGE docker compose up -d vh-srv-events
  only:
    - tags
  when: manual

