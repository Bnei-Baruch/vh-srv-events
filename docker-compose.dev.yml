name: vh-srv-events

services:
  
  db:
    image: postgres:12
    container_name: vh-srv-events-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-events}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - vh-srv-events-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-user} -d ${POSTGRES_DB:-events}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
    driver: local

networks:
  vh-srv-events-network:
    name: vh-srv-events-network
    driver: bridge
