name: CI/CD

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:12
        env:
          POSTGRES_DB: events_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Run tests
        env:
          DB_HOST: localhost
          DB_PORT: 5432
          DB_USER: postgres
          DB_PASSWORD: postgres
          DB_DATABASE: events_test
          DB_SSLMODE: disable
          APP_ENV: test
          APP_MODE: debug
        run: |
          go mod download
          set -o pipefail
          go test -v -race -coverprofile=coverage.out ./... | tee test.log
          go tool cover -func=coverage.out

      - name: Upload test log on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v4
        with:
          name: test-log
          path: test.log
          retention-days: 7

  build:
    needs: test
    if: ${{ success() }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set SHORT_SHA
        run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/bnei-baruch/vh-srv-events:latest
            ghcr.io/bnei-baruch/vh-srv-events:${{ env.SHORT_SHA }}
          build-args: |
            GIT_SHA=${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v5

      - name: Set environment variables
        run: |
          if [[ "${{ inputs.environment }}" == "production" ]]; then
            echo "SSH_HOST=${{ secrets.VH_HOST_PRODUCTION }}" >> $GITHUB_ENV
          else
            echo "SSH_HOST=${{ secrets.VH_HOST_STAGING }}" >> $GITHUB_ENV
          fi
          echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV
          echo "DEPLOY_ENV=${{ inputs.environment }}" >> $GITHUB_ENV

      - name: Copy docker-compose.yml to VM
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.SSH_HOST }}
          username: root
          key: ${{ secrets.BBDEPLOYMENT_SSH_PRIVATE_KEY }}
          source: "docker-compose.yml"
          target: /opt/vh/vh-srv-events/

      - name: Deploy to VM
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ env.SSH_HOST }}
          username: root
          key: ${{ secrets.BBDEPLOYMENT_SSH_PRIVATE_KEY }}
          envs: SHORT_SHA,DEPLOY_ENV
          script: |
            set -e
            cd /opt/vh/vh-srv-events

            if [ ! -f .env ]; then
              echo "ERROR: .env file missing at /opt/vh/vh-srv-events/.env"
              exit 1
            fi

            export IMAGE_NAME=ghcr.io/bnei-baruch/vh-srv-events:$SHORT_SHA

            if [ "$DEPLOY_ENV" = "staging" ]; then
              mkdir -p /opt/srv-events-db
              export COMPOSE_PROFILES=staging
            fi

            docker compose pull vh-srv-events
            docker compose up -d --remove-orphans

            # Health check: /health requires auth, so 401 means service is up
            sleep 5
            for i in 1 2 3; do
              HTTP_CODE=$(curl -so /dev/null -w '%{http_code}' http://localhost:7475/health || true)
              if [ "$HTTP_CODE" = "401" ] || [ "$HTTP_CODE" = "200" ]; then
                echo "Health check passed (HTTP $HTTP_CODE)"
                exit 0
              fi
              echo "Health check attempt $i: HTTP $HTTP_CODE, retrying in 5s..."
              sleep 5
            done
            echo "WARNING: health check failed after 3 attempts"
            docker logs vh-srv-events --tail 20
