services:
  eventsdb:
    image: postgres:9.6
    container_name: eventsdb
    restart: unless-stopped
    profiles:
      - staging
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_DB: ${DB_DATABASE}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - /opt/srv-events-db:/docker-entrypoint-initdb.d
  vh-srv-events:
    image: "${IMAGE_NAME}"
    container_name: 'vh-srv-events'
    restart: unless-stopped
    env_file: .env
    cpus: '0.5'
    mem_limit: 250M
    ports:
      - 7475:8080
networks:
  default:
    name: vh
    external: true
